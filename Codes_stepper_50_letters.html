<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sequence Pilot</title>

#resetBtn{background:#334155}

.tile{border:1px solid #d4c6b2;border-radius:12px;background:#fff8ed;padding:10px}
.tile .v{font:800 24px/1 "Trebuchet MS",sans-serif;margin-top:3px}
.center{margin-top:12px;border:1px solid #d0c2ad;border-radius:16px;padding:16px;background:linear-gradient(180deg,#fff,#f6eee2)}
.token{min-height:240px;border-radius:18px;border:2px solid #b8a68d;background:linear-gradient(180deg,#fffefb,#f9f1e5);display:flex;align-items:center;justify-content:center;text-align:center;font-size:clamp(54px,12vw,120px);font-weight:800;letter-spacing:.03em;box-shadow:0 18px 34px rgba(17,24,39,.14);transition:transform .12s ease}
.token.pulse{transform:scale(1.02)}
.strip{margin-top:8px;border:1px solid #d8cbbb;border-radius:10px;background:#fff9f0;padding:10px;font:13px Consolas,monospace;white-space:pre-wrap}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid #cdbba4;border-radius:999px;padding:4px 10px;background:#fff3e1;font:12px Consolas,monospace}
.footer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(246,240,230,0),rgba(246,240,230,.95) 45%,rgba(246,240,230,1));padding:10px 12px 12px}
.dock{max-width:980px;margin:0 auto;display:flex;justify-content:center}
@media (max-width:740px){.grid{grid-template-columns:repeat(2,minmax(120px,1fr))}.token{min-height:210px}}
</style></head>

function t2d(tok){const t=String(tok).trim().toLowerCase(); if(t==='backspace') return null; if(digitWords.has(t)) return wordToDigit[t]; return letterToDigit[t]??null;}
function renderSubs(){if(!state.subs.length){el.subs.innerHTML='<span class="chip">none</span>';return;} el.subs.innerHTML=state.subs.map((s,n)=>'<span class="chip">#'+(n+1)+' screen '+s.screen+'</span>').join('');}
function render(msg){el.idx.textContent=String(state.i);el.tot.textContent=String(tokens().length);el.screen.textContent=String(state.screen);el.count.textContent=state.f.length+' / 4';el.status.textContent=msg||'Ready.';renderSubs(); if(state.i>=tokens().length){el.next.disabled=true;el.token.textContent='DONE';} else el.next.disabled=false;}
function pulse(){el.token.classList.remove('pulse');void el.token.offsetWidth;el.token.classList.add('pulse');}
function step(){if(state.i>=tokens().length) return; const tok=tokens()[state.i]; el.token.textContent=tok; pulse(); if(String(tok).toLowerCase()==='backspace') state.f=state.f.slice(0,-1); else {const d=t2d(tok); if(d!==null) state.f+=d;} let msg='Token: '+tok; if(state.f.length===4){state.subs.push({screen:state.screen}); msg='Screen '+state.screen+' submitted (auto)'; state.f=''; state.screen+=1;} state.i+=1; render(msg);} 
function reset(){state.i=0;state.f='';state.screen=1;state.subs=[];el.token.textContent='READY';render('Press Next to start.');}
DATA.forEach((_,i)=>{const o=document.createElement('option');o.value=String(i);o.textContent='Sequence '+(i+1);el.seq.appendChild(o);});
el.seq.addEventListener('change',()=>{state.s=Number(el.seq.value); reset();});
el.next.addEventListener('click',step); el.reset.addEventListener('click',reset);
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();step();} else if(e.key.toLowerCase()==='r') reset();});
reset();
</script></body></html>
