<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Passcode Stepper</title>
  <style>
    :root { --bg:#f4f6fb; --card:#fff; --ink:#12131a; --muted:#5d6577; --brand:#1f5eff; --ok:#0f9d58; --warn:#c27600; --line:#d9deea; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:900px; margin:20px auto; padding:0 14px 20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    select, button { border:1px solid #bfc8df; border-radius:8px; padding:10px 12px; font-size:15px; background:#fff; }
    button { cursor:pointer; background:var(--brand); color:#fff; border:0; font-weight:700; }
    button.secondary { background:#5b667f; }
    button:disabled { background:#aeb6ca; cursor:not-allowed; }
    .token { text-align:center; font-size:44px; font-weight:800; letter-spacing:1px; padding:24px 10px; border-radius:10px; background:linear-gradient(180deg,#f8fbff,#eef3ff); border:1px solid #d8e1ff; min-height:110px; display:flex; align-items:center; justify-content:center; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:8px; }
    .stat { border:1px solid var(--line); border-radius:10px; padding:10px; background:#fbfcff; }
    .label { color:var(--muted); font-size:13px; }
    .value { font-size:22px; font-weight:800; margin-top:2px; }
    .screen1 { color:var(--ok); }
    .screen2 { color:var(--warn); }
    .mono { font-family:Consolas,monospace; background:#0b1020; color:#edf1ff; border-radius:10px; padding:10px; min-height:44px; white-space:pre-wrap; word-break:break-word; }
  </style>
</head>

    const letterToDigit = { a:"2", ay:"2", d:"3", dee:"3", g:"4", gee:"4", j:"5", jay:"5", m:"6", em:"6", p:"7", pee:"7", t:"8", tee:"8", w:"9", doubleyou:"9", "double-you":"9" };

    const codeSelect = document.getElementById('codeSelect');
    const tokenBox = document.getElementById('tokenBox');
    const screenVal = document.getElementById('screenVal');
    const countVal = document.getElementById('countVal');
    const progressVal = document.getElementById('progressVal');
    const fieldBox = document.getElementById('fieldBox');
    const submitBox = document.getElementById('submitBox');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    let state = { codeIndex: 0, tokenIndex: 0, currentField: "", screen: 1, submissions: [] };

    function currentTokens() { return DATA[state.codeIndex].tokens; }

    function tokenToDigit(token) {
      const t = String(token).trim().toLowerCase();
      if (t === 'backspace') return null;
      if (digitWords.has(t)) return wordToDigit[t];
      if (letterToDigit[t]) return letterToDigit[t];
      return null;
    }

    function render() {
      const tokens = currentTokens();
      progressVal.textContent = state.tokenIndex + ' / ' + tokens.length;
      screenVal.textContent = String(state.screen);
      screenVal.className = 'value ' + (state.screen === 1 ? 'screen1' : 'screen2');
      countVal.textContent = state.currentField.length + ' / 4';
      fieldBox.textContent = state.currentField || '(empty)';

      if (state.tokenIndex === 0) tokenBox.textContent = 'Press Next';
      if (state.tokenIndex >= tokens.length) {
        tokenBox.textContent = 'Done';
        nextBtn.disabled = true;
      } else {
        nextBtn.disabled = false;
      }

      if (!state.submissions.length) submitBox.textContent = '(none yet)';
      else submitBox.textContent = state.submissions.map((s, i) => '#' + (i+1) + ': Screen ' + s.screen + ' submitted ' + s.code).join('
');
    }

    function stepNext() {
      const tokens = currentTokens();
      if (state.tokenIndex >= tokens.length) return;

      const tok = tokens[state.tokenIndex];
      tokenBox.textContent = tok;

      if (String(tok).toLowerCase() === 'backspace') {
        state.currentField = state.currentField.slice(0, -1);
      } else {
        const d = tokenToDigit(tok);
        if (d !== null) state.currentField += d;
      }

      if (state.currentField.length === 4) {
        state.submissions.push({ screen: state.screen, code: state.currentField });
        state.currentField = '';
        state.screen += 1;
      }

      state.tokenIndex += 1;
      render();
    }

    function resetState() {
      state.tokenIndex = 0;
      state.currentField = '';
      state.screen = 1;
      state.submissions = [];
      tokenBox.textContent = 'Press Next';
      render();
    }

    DATA.forEach((e, i) => {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = e.title;
      codeSelect.appendChild(opt);
    });

    codeSelect.addEventListener('change', () => {
      state.codeIndex = Number(codeSelect.value);
      resetState();
    });

    nextBtn.addEventListener('click', stepNext);
    resetBtn.addEventListener('click', resetState);

    resetState();
  </script>
</body>
</html>
