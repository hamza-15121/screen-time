<html lang="en">

    .bottom { position:sticky; bottom:0; background:rgba(248,250,252,.96); border-top:1px solid var(--line); padding:12px; backdrop-filter: blur(4px); }
    .bar { max-width:900px; margin:0 auto; display:flex; gap:10px; justify-content:center; }

</head>

      reset: document.getElementById('resetBtn')
    };

    const state = { seq: 0, i: 0, field: '', screen: 1, submissions: [] };

    function tokens() { return DATA[state.seq].tokens; }

    function tokenToDigit(tok) {
      const t = String(tok).trim().toLowerCase();
      if (t === 'backspace') return null;
      if (digitWords.has(t)) return wordToDigit[t];
      return letterToDigit[t] ?? null;
    }

    function render(msg) {
      el.idx.textContent = String(state.i);
      el.tot.textContent = String(tokens().length);
      el.screen.textContent = String(state.screen);
      el.count.textContent = state.field.length + ' / 4';
      el.status.textContent = msg || 'Ready.';
      el.submits.textContent = state.submissions.length
        ? 'Submissions: ' + state.submissions.map((s, n) => '#' + (n+1) + ' Screen ' + s.screen).join(' | ')
        : 'Submissions: (none)';

      if (state.i >= tokens().length) {
        el.next.disabled = true;
        el.token.textContent = 'DONE';
      } else {
        el.next.disabled = false;
      }
    }

    function step() {
      if (state.i >= tokens().length) return;
      const tok = tokens()[state.i];
      el.token.textContent = tok;

      if (String(tok).toLowerCase() === 'backspace') {
        state.field = state.field.slice(0, -1);
      } else {
        const d = tokenToDigit(tok);
        if (d !== null) state.field += d;
      }

      let msg = 'Token: ' + tok;
      if (state.field.length === 4) {
        state.submissions.push({ screen: state.screen });
        msg = 'Screen ' + state.screen + ' submitted (auto)';
        state.field = '';
        state.screen += 1;
      }

      state.i += 1;
      render(msg);
    }

    function reset() {
      state.i = 0;
      state.field = '';
      state.screen = 1;
      state.submissions = [];
      el.token.textContent = 'READY';
      render('Press Next to start.');
    }

    DATA.forEach((_, i) => {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = 'Sequence ' + (i + 1);
      el.seqSelect.appendChild(opt);
    });

    el.seqSelect.addEventListener('change', () => {
      state.seq = Number(el.seqSelect.value);
      reset();
    });

    el.next.addEventListener('click', step);
    el.reset.addEventListener('click', reset);

    reset();
  </script>
</body>
</html>
